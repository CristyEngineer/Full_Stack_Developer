<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id= "title"> Formulier </h1>
    <p id="description"> Vul alstublieft het formulier in: </p>
    <form id="survey-form">
      <label id="name-label" for="name">Naam: </label>
      <input id="name" type="text" placeholder="Voer je naam in" required>
      <br><br>
      <label id="email-label" for="email">Mail: </label>      
      <input id="email" type="email" placeholder="Voer je email in" required>
      <br><br>
      <label id="number-label" for="number">Telefoonnummer: </label>
      <input
      id="number"
      type="number"
      min="1"
      max="120"
      placeholder="Voer je telefoonnummer in" required>
      <br><br>
      <label id="gender" for="dropdown"> Geslacht: </label>
      <select id="dropdown">
        <option value="none">Geen</option>
        <option value="vrouw">Vrouw</option>
        <option value="man">Man</option>
      </select>
      <br><br>
      <p>Wat vond je van de training?</p>
      <label>
        <input type="checkbox" value="bad">
        Slecht
        </label>
        <label>
          <input type="checkbox" value="mediocre">
          Matig
          </label>
          <label>
            <input type="checkbox" value="good">
            Goed
            </label>
          <p>Zou je deze training aanbevelen?</p>
          <label>
            <input type="radio" name="recommend" value="yes"> Ja
            </label>
            <label>
              <input type="radio" name="recommend" value="no">
              Nee
              </label>
              <textarea rows="5" cols="25" placeholder="Opmerkingen"></textarea>
              <button id="submit" type="submit">Inleveren</button>
    </form>
    
  </body>
</html>
